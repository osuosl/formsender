name: Python package

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # The test suite mocks all external calls (reCAPTCHA, RT), so it needs the
    # config keys to exist but not real secrets. Dummy values keep CI runnable
    # on fork pull requests, which cannot access repository secrets.
    env:
      TOKEN: ci-token
      RECAPTCHA_SECRET: ci-recaptcha-secret
      RT_TOKEN: ci-rt-token
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: make flake
      - name: Tests with coverage
        run: |
          cp conf.py.dist conf.py
          make coverage
