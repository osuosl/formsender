---
name: Create and publish a Docker image

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '45 18 * * 3'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and export Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: osuosl/formsender:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test the image
        env:
          TOKEN: ci-token
          RECAPTCHA_SECRET: ci-recaptcha-secret
          RT_TOKEN: ci-rt-token
        run: |
          docker run -d --name formsender -p 5000:5000 \
            -e TOKEN -e RECAPTCHA_SECRET -e RT_TOKEN \
            osuosl/formsender:test
          for i in $(seq 1 10); do
            if curl -fsS http://localhost:5000/server-status; then
              echo " - server-status OK"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "server-status did not come up"
              docker logs formsender
              exit 1
            fi
            sleep 2
          done
          docker rm -f formsender
      - name: Log in to the Container registry
        if: contains(fromJSON('["push", "schedule"]'), github.event_name)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        if: contains(fromJSON('["push", "schedule"]'), github.event_name)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=schedule,${{ github.ref_name }}
      - name: Build and push Docker image
        if: contains(fromJSON('["push", "schedule"]'), github.event_name)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
